services:
  zwing-backend:
    build: .
    container_name: zwing-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/zwing_db
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=rootpassword
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - AZURE_STORAGE_CONNECTION_STRING=${AZURE_STORAGE_CONNECTION_STRING}
      - AZURE_BLOB_UPLOADS_CONTAINER=${AZURE_BLOB_UPLOADS_CONTAINER}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: postgres:15-alpine
    container_name: zwing-db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: zwing_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d zwing_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - zwing_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: zwing-redis
    ports:
      - "6379:6379"
    restart: always

volumes:
  zwing_postgres_data: