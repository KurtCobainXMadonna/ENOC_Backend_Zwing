spring.application.name=ZwingBackend
server.port=8080

# -- PostgreSQL ----------------------------------------------------------------------------
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/zwing_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:rootpassword}
spring.datasource.driver-class-name=org.postgresql.Driver

# Neon requires SSL ? this property is harmless on local (ignored if not SSL)
spring.datasource.hikari.data-source-properties.sslmode=${DB_SSLMODE:disable}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=${JPA_SHOW_SQL:true}

# -- Flyway ------------------------------------------------------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# -- Redis -------------------------------------------------------
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${REDIS_SSL_ENABLED:false}

# -- Auth ---------------------------------------
jwt.secret=${JWT_SECRET}
google.client.id=${GOOGLE_CLIENT_ID}
auth.access-token.ttl-seconds=${AUTH_ACCESS_TTL_SECONDS:900}
auth.refresh-token.ttl-seconds=${AUTH_REFRESH_TTL_SECONDS:3600}

# -- Azure Blob Storage (user audio uploads) -----
azure.storage.connection-string=${AZURE_STORAGE_CONNECTION_STRING:}
azure.storage.uploads-container=${AZURE_BLOB_UPLOADS_CONTAINER:audio-uploads}

# -- Multipart upload limits ---------------------
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB